version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: nearbook_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5433:5432'
    volumes:
      - nearbook_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nearbook_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - nearbook_redis_data:/data

volumes:
  nearbook_postgres_data:
  nearbook_redis_data: