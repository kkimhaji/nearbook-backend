services:
  postgres:
    image: postgres:16-alpine
    container_name: nearbook_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5433:5432'
    volumes:
      - nearbook_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nearbook_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - nearbook_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  nearbook_server:
      build:
        context: .
        dockerfile: DockerFile
      container_name: nearbook_server
      restart: unless-stopped
      ports:
        - '3000:3000'
      environment:
        DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        REDIS_URL: redis://redis:6379
        JWT_SECRET: ${JWT_SECRET}
        JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
        SMTP_HOST: ${SMTP_HOST}
        SMTP_PORT: ${SMTP_PORT}
        SMTP_USER: ${SMTP_USER}
        SMTP_PASS: ${SMTP_PASS}
        SMTP_FROM: ${SMTP_FROM}
      volumes:
        - ./uploads:/app/uploads 
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy

volumes:
  nearbook_postgres_data:
  nearbook_redis_data: